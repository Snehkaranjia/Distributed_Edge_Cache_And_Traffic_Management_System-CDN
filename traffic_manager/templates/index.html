<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN Client</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent-2: #f59e0b;
      --ok: #10b981;
      --err: #ef4444;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 20%, rgba(34, 211, 238, 0.18), transparent 35%),
        radial-gradient(circle at 86% 0%, rgba(245, 158, 11, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .shell {
      width: 100%;
      max-width: 980px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: linear-gradient(155deg, rgba(17, 24, 39, 0.92), rgba(31, 41, 55, 0.9));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.55);
      animation: fadeInUp 500ms ease-out;
    }

    .head {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      background: rgba(34, 211, 238, 0.14);
      color: var(--accent);
      border: 1px solid rgba(34, 211, 238, 0.35);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.92), rgba(30, 41, 59, 0.86));
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: var(--radius);
      padding: 14px;
      animation: reveal 450ms ease both;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      color: #f8fafc;
    }

    label {
      display: block;
      margin-top: 8px;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.65);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.16);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btn-main {
      background: linear-gradient(90deg, #0891b2, #22d3ee);
      color: #06202a;
      border: none;
    }

    .btn-alt {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: #2a1d08;
      border: none;
    }

    .status {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--muted);
      min-height: 20px;
    }

    .ok {
      color: var(--ok);
    }

    .err {
      color: var(--err);
    }

    .output {
      grid-column: 1 / -1;
    }

    pre {
      margin: 0;
      max-height: 340px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(2, 6, 23, 0.75);
      padding: 12px;
      line-height: 1.4;
      color: #dbeafe;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .body {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div>
        <h1 class="title">CDN Client Console</h1>
        <p class="subtitle">Send request to Traffic Manager and inspect routed edge response.</p>
      </div>
      <div class="badge">Client UI Only</div>
    </div>

    <div class="body">
      <section class="card">
        <h2>Request Content</h2>
        <label for="key">Content Key</label>
        <input id="key" value="index" placeholder="index">

        <label for="region">Client Region</label>
        <select id="region">
          <option value="asia">asia</option>
          <option value="eu">eu</option>
          <option value="us">us</option>
        </select>

        <div class="actions">
          <button class="btn-main" id="fetchBtn">Fetch From CDN</button>
          <button class="btn-alt" id="edgeBtn">Check Edge Health</button>
        </div>
        <div class="status" id="status">Ready.</div>
      </section>

      <section class="card output">
        <h2>Response</h2>
        <pre id="output">{
  "message": "Waiting for request"
}</pre>
      </section>
    </div>
  </div>

  <script>
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status err" : "status ok";
    }

    function render(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      let payload;
      try {
        payload = await res.json();
      } catch {
        payload = { error: "non_json_response", status: res.status };
      }
      if (!res.ok) {
        throw new Error(JSON.stringify(payload));
      }
      return payload;
    }

    async function fetchContent() {
      const key = document.getElementById("key").value.trim();
      const region = document.getElementById("region").value;
      if (!key) {
        setStatus("Please enter content key.", true);
        return;
      }

      setStatus("Fetching from traffic manager...", false);
      try {
        const data = await fetchJson(`/fetch/${encodeURIComponent(key)}?region=${encodeURIComponent(region)}`);
        render(data);
        setStatus("Request completed successfully.", false);
      } catch (err) {
        render({ error: "request_failed", details: err.message });
        setStatus("Request failed.", true);
      }
    }

    async function checkEdges() {
      setStatus("Checking edge health...", false);
      try {
        const data = await fetchJson("/edges");
        render(data);
        setStatus("Edge health fetched.", false);
      } catch (err) {
        render({ error: "health_check_failed", details: err.message });
        setStatus("Edge health check failed.", true);
      }
    }

    document.getElementById("fetchBtn").addEventListener("click", fetchContent);
    document.getElementById("edgeBtn").addEventListener("click", checkEdges);
  </script>
</body>
</html>
